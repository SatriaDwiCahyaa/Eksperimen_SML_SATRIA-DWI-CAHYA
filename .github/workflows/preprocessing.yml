name: Preprocessing Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'creditcard_raw/**'
      - 'preprocessing/automate_SATRIA-DWI-CAHYA.py'
  workflow_dispatch:  # Memungkinkan trigger manual dari tab Actions

permissions:
  contents: write  # Izin untuk push hasil preprocessing ke repository

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true  # Download file LFS saat checkout

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn imbalanced-learn

      - name: Jalankan preprocessing otomatis
        run: python preprocessing/automate_SATRIA-DWI-CAHYA.py

      - name: Upload hasil preprocessing sebagai artifact
        uses: actions/upload-artifact@v4
        with:
          name: creditcard-preprocessing-result
          path: preprocessing/creditcard_preprocessing/

      - name: Commit dan push hasil preprocessing
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/creditcard_preprocessing/
          git diff --staged --quiet || git commit -m "Auto: Update hasil preprocessing [skip ci]"
          git push
